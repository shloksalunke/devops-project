version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: nmride
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      args:
        - VITE_API_BASE_URL=/api
    environment:
    - DATABASE_URL=postgresql://postgres:postgres@db:5432/nmride
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  redis:
    image: redis:7-alpine

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: